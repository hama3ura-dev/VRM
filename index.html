<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM Viewer_テスト版</title>

    <!-- Three.js（古い書き方対応版） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>

    <!-- GLTFLoader（THREE.GLTFLoader が使える版） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- VRM Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three-vrm@0.6.7/build/three-vrm.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="info">マウス移動／タップ移動：顔を向ける　マウスホイール／ピンチ：拡大縮小</div>

    <script>
        let scene, camera, renderer, currentVrm;
        let mouseX = 0, mouseY = 0;

        init();
        loadVRM("model.vrm");  // ← あなたのファイル名に合わせてある

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
            camera.position.set(0, 1.4, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1);
            scene.add(light);

            window.addEventListener("resize", onWindowResize);
            window.addEventListener("mousemove", onMouseMove);
            window.addEventListener("wheel", onWheel);
            window.addEventListener("touchmove", onTouchMove);
        }

        function loadVRM(url) {
            const loader = new THREE.GLTFLoader();

            loader.load(url, (gltf) => {
                THREE.VRM.from(gltf).then((vrm) => {
                    if (currentVrm) scene.remove(currentVrm.scene);
                    currentVrm = vrm;

                    vrm.scene.rotation.y = Math.PI;
                    scene.add(vrm.scene);
                });
            });
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(event) {
            const t = event.touches[0];
            mouseX = (t.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(t.clientY / window.innerHeight) * 2 + 1;
        }

        function onWheel(event) {
            camera.position.z += event.deltaY * 0.002;
            camera.position.z = Math.min(Math.max(camera.position.z, 1.2), 5);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (currentVrm) {
                const head = currentVrm.humanoid.getBoneNode("head");
                if (head) {
                    head.rotation.y = mouseX * 0.5;
                    head.rotation.x = mouseY * 0.3;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
